<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My IPTV - 港台电视直播源</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .section { margin-bottom: 30px; }
        .section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .link-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .link-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .link-card .name { font-weight: bold; margin-bottom: 5px; }
        .link-card .url { 
            font-size: 0.8rem; 
            color: #aaa; 
            word-break: break-all;
            display: none;
        }
        .link-card.show .url { display: block; }
        .btn {
            display: inline-block;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin: 5px;
        }
        .btn:hover { opacity: 0.9; }
        .update-time { text-align: center; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 My IPTV 直播源</h1>
        
        <div class="section">
            <h2>🇭🇰 香港频道</h2>
            <div class="link-card" onclick="toggle(this)">
                <div class="name">翡翠台 J2 无线新闻台</div>
                <div class="url">https://你的域名.github.io/iptv-web/hktw.m3u</div>
            </div>
            <a class="btn" href="hktw.m3u">📺 香港台 M3U</a>
        </div>
        
        <div class="section">
            <h2>🌏 全球频道</h2>
            <a class="btn" href="all.m3u">🌐 全球 M3U</a>
        </div>
        
        <div class="section">
            <h2>📱 使用说明</h2>
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px;">
                <p>1. 下载 M3U 文件到本地</p>
                <p>2. 用 IPTV Player 打开（支持：PotPlayer, VLC, nPlayer, KODI）</p>
                <p>3. 也可以导入到电视盒子使用</p>
            </div>
        </div>
        
        <p class="update-time">最后更新: 2026-03-30</p>
    </div>
    <script>
        function toggle(el) { el.classList.toggle('show'); }
    </script>
</body>
</html>
